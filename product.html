<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Детальніше про модель</title><link rel="stylesheet" href="style.css"></head><body><nav class="nav-tabs"><button onclick="location.href='index.html'">Головна</button><button onclick="location.href='index.html#catalog'">Каталог</button><button onclick="openCart()">🛒 Кошик (<span id="cart-count">0</span>)</button></nav><main class="product-detail-page"><div class="product-detail-card"><div class="detail-gallery"><img id="product-image" class="detail-image" src="" alt=""><div id="product-thumbs" class="product-thumbs"></div></div><div class="detail-info"><h1 id="product-name"></h1><p><strong>Матеріал:</strong> <span id="product-material"></span></p><p id="product-description"></p><label>Оберіть масштаб:</label><select id="detail-scale"></select><label>Варіант:</label><select id="detail-type"><option value="assembled">Зібрана модель</option><option value="unassembled">Розібрана модель</option></select> <div id="color-variants" class="product-options"></div>
<div id="custom-colors-box" class="product-options" style="display:none;"></div> <div id="product-options" class="product-options"></div><h2>Ціна: <span id="detail-price">0</span> грн</h2><button class="checkout-btn" onclick="addConfiguredToCart()">Додати в кошик</button></div></div></main><div id="cart-modal" class="cart-modal"><div class="cart-box"><button class="cart-close" onclick="closeCart()">×</button><h2>Ваш кошик</h2><div id="cart-items"></div><h3>Разом: <span id="cart-total">0</span> грн</h3></div></div><script>
let cart=JSON.parse(localStorage.getItem("cart"))||[];let currentProduct=null;function getProductIdFromUrl(){return new URLSearchParams(window.location.search).get("id")}function saveCart(){localStorage.setItem("cart",JSON.stringify(cart));updateCartCount()}function updateCartCount(){const c=document.getElementById("cart-count");if(c)c.textContent=cart.reduce((s,i)=>s+i.quantity,0)}async function loadProductDetails(){const id=getProductIdFromUrl();try{const r=await fetch("products.json");const products=await r.json();currentProduct=products.find(i=>i.id===id);if(!currentProduct){document.querySelector("main").innerHTML="<h2 class='not-found'>Товар не знайдено</h2>";return}const imgs=currentProduct.images&&currentProduct.images.length?currentProduct.images:[currentProduct.image];document.getElementById("product-image").src=imgs[0];document.getElementById("product-name").textContent=currentProduct.name;document.getElementById("product-material").textContent=currentProduct.material;document.getElementById("product-description").textContent=currentProduct.description;renderThumbs(imgs);renderScales();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        function renderColorVariants() {
  const box = document.getElementById("color-variants");
  box.innerHTML = "";

  if (!currentProduct.colorVariants || currentProduct.colorVariants.length === 0) return;

  box.innerHTML = "<h3>Оберіть колір моделі</h3>";

  currentProduct.colorVariants.forEach((variant, index) => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "color-variant-btn";
    btn.textContent = variant.name + (variant.price > 0 ? " +" + variant.price + " грн" : "");
    btn.dataset.name = variant.name;
    btn.dataset.image = variant.image;
    btn.dataset.price = variant.price || 0;

    if (index === 0) btn.classList.add("active-color");

    btn.addEventListener("click", () => {
      document.querySelectorAll(".color-variant-btn").forEach(b => b.classList.remove("active-color"));
      btn.classList.add("active-color");

      document.getElementById("product-image").src = variant.image;

      if (variant.name === "Індивідуальні кольори") {
        renderCustomColorParts();
        document.getElementById("custom-colors-box").style.display = "block";
      } else {
        document.getElementById("custom-colors-box").style.display = "none";
      }

      updateDetailPrice();
    });

    box.appendChild(btn);
  });
}

function renderCustomColorParts() {
  const box = document.getElementById("custom-colors-box");
  box.innerHTML = "<h3>Індивідуальні кольори деталей</h3>";

  if (!currentProduct.customColorParts) return;

  const colors = ["Не обрано", "Червоний", "Синій", "Зелений", "Чорний", "Білий", "Сірий", "Жовтий", "Помаранчевий", "Хакі"];

  currentProduct.customColorParts.forEach(part => {
    const options = colors.map(color => `<option value="${color}">${color}</option>`).join("");

    box.innerHTML += `
      <div class="option-block">
        <label>${part}</label>
        <select class="custom-color-select" data-title="${part}">
          ${options}
        </select>
      </div>
    `;
  });

  document.querySelectorAll(".custom-color-select").forEach(select => {
    select.addEventListener("change", updateDetailPrice);
  });
}

function getSelectedColorVariant() {
  const active = document.querySelector(".color-variant-btn.active-color");

  if (!active) {
    return {
      title: "Колір моделі",
      value: "Не обрано",
      price: 0
    };
  }

  return {
    title: "Колір моделі",
    value: active.dataset.name,
    price: Number(active.dataset.price || 0)
  };
}

function getCustomColors() {
  const selected = [];

  document.querySelectorAll(".custom-color-select").forEach(select => {
    if (select.value !== "Не обрано") {
      selected.push({
        title: select.dataset.title,
        value: select.value,
        price: 0
      });
    }
  });

  return selected;
}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                       
renderProductOptions();updateDetailPrice()}catch(e){console.error(e);document.querySelector("main").innerHTML="<h2 class='not-found'>Помилка завантаження товару</h2>"}}function renderThumbs(imgs){const box=document.getElementById("product-thumbs");box.innerHTML="";imgs.forEach((src,i)=>{const img=document.createElement("img");img.src=src;img.alt="Фото "+(i+1);img.onclick=()=>document.getElementById("product-image").src=src;box.appendChild(img)})}function renderScales(){const s=document.getElementById("detail-scale");s.innerHTML="";currentProduct.scales.forEach(i=>s.innerHTML+=`<option value="${i.scale}" data-assembled="${i.assembled}" data-unassembled="${i.unassembled}">${i.scale}</option>`)}function renderProductOptions(){const box=document.getElementById("product-options");box.innerHTML="";if(!currentProduct.options||!currentProduct.options.length)return;box.innerHTML="<h3>Додаткові опції</h3>";currentProduct.options.forEach(o=>{const w=document.createElement("div");w.className="option-block";if(o.type==="select"){const choices=o.choices.map(c=>`<option value="${c.name}" data-price="${c.price||0}">${c.name}${c.price>0?" +"+c.price+" грн":""}</option>`).join("");w.innerHTML=`<label>${o.title}</label><select class="product-option" data-title="${o.title}">${choices}</select>`}if(o.type==="checkbox"){w.innerHTML=`<label class="checkbox-option"><input type="checkbox" class="product-option-checkbox" data-title="${o.title}" data-price="${o.price||0}"> ${o.title}${o.price>0?" +"+o.price+" грн":""}</label>`}if(o.type==="text"){w.innerHTML=`<label>${o.title}${o.price>0?" +"+o.price+" грн":""}</label><input type="text" class="product-option-text" data-title="${o.title}" data-price="${o.price||0}" placeholder="${o.placeholder||""}">`}box.appendChild(w)});document.querySelectorAll(".product-option,.product-option-checkbox,.product-option-text").forEach(i=>{i.addEventListener("change",updateDetailPrice);i.addEventListener("input",updateDetailPrice)})}function getSelectedOptions(){const selectedOptions=[];let optionsTotal=0;document.querySelectorAll(".product-option").forEach(s=>{const opt=s.options[s.selectedIndex];const price=Number(opt.dataset.price||0);selectedOptions.push({title:s.dataset.title,value:opt.value,price});optionsTotal+=price});document.querySelectorAll(".product-option-checkbox").forEach(ch=>{if(ch.checked){const price=Number(ch.dataset.price||0);selectedOptions.push({title:ch.dataset.title,value:"Так",price});optionsTotal+=price}});document.querySelectorAll(".product-option-text").forEach(inp=>{if(inp.value.trim()){const price=Number(inp.dataset.price||0);selectedOptions.push({title:inp.dataset.title,value:inp.value.trim(),price});optionsTotal+=price}});return{selectedOptions,optionsTotal}}function updateDetailPrice(){const scale=document.getElementById("detail-scale"),type=document.getElementById("detail-type");if(!scale.options.length)return;const s=scale.options[scale.selectedIndex];const base=type.value==="assembled"?Number(s.dataset.assembled):Number(s.dataset.unassembled);const{optionsTotal}=getSelectedOptions();document.getElementById("detail-price").textContent=base+optionsTotal}function addConfiguredToCart(){const scale=document.getElementById("detail-scale"),type=document.getElementById("detail-type");const s=scale.options[scale.selectedIndex];const {selectedOptions,optionsTotal}=getSelectedOptions();const base=type.value==="assembled"?Number(s.dataset.assembled):Number(s.dataset.unassembled);const item={name:currentProduct.name,image:currentProduct.image,scale:s.value,type:type.value==="assembled"?"Зібрана модель":"Розібрана модель",options:selectedOptions,price:base+optionsTotal,quantity:1};const ex=cart.find(i=>i.name===item.name&&i.scale===item.scale&&i.type===item.type&&JSON.stringify(i.options||[])===JSON.stringify(item.options||[]));if(ex)ex.quantity++;else cart.push(item);saveCart();alert("Товар додано в кошик!")}function formatOptions(options){if(!options||!options.length)return"";return options.map(o=>`${o.title}: ${o.value}${o.price?" (+"+o.price+" грн)":""}`).join("<br>")}function openCart(){renderCart();document.getElementById("cart-modal").style.display="flex"}function closeCart(){document.getElementById("cart-modal").style.display="none"}function renderCart(){const items=document.getElementById("cart-items"),totalBox=document.getElementById("cart-total");items.innerHTML="";let total=0;if(!cart.length){items.innerHTML="<p>Кошик порожній</p>";totalBox.textContent=0;return}cart.forEach((item,index)=>{const itemTotal=item.price*item.quantity;total+=itemTotal;items.innerHTML+=`<div class="cart-item"><img src="${item.image}" alt="${item.name}" class="cart-img"><div class="cart-item-info"><strong>${item.name}</strong><p>Масштаб: ${item.scale}</p><p>${item.type}</p>${item.options&&item.options.length?`<p class="cart-options">${formatOptions(item.options)}</p>`:""}<p>${item.price} грн × ${item.quantity} = ${itemTotal} грн</p><button onclick="changeQuantity(${index},-1)">−</button><button onclick="changeQuantity(${index},1)">+</button><button onclick="removeFromCart(${index})">Видалити</button></div></div>`});totalBox.textContent=total}function changeQuantity(i,a){cart[i].quantity+=a;if(cart[i].quantity<=0)cart.splice(i,1);saveCart();renderCart()}function removeFromCart(i){cart.splice(i,1);saveCart();renderCart()}document.getElementById("detail-scale").addEventListener("change",updateDetailPrice);document.getElementById("detail-type").addEventListener("change",updateDetailPrice);document.addEventListener("DOMContentLoaded",()=>{loadProductDetails();updateCartCount()});
</script></body></html>
