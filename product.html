<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Детальніше про модель</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="nav-tabs">
  <button onclick="location.href='index.html'">Головна</button>
  <button onclick="location.href='index.html#catalog'">Каталог</button>
  <button onclick="openCart()">🛒 Кошик (<span id="cart-count">0</span>)</button>
</nav>

<main class="product-detail-page">
  <div class="product-detail-card">
    <div class="detail-gallery">
      <img id="product-image" class="detail-image" src="" alt="">
      <div id="product-thumbs" class="product-thumbs"></div>
      <div id="color-variants" class="product-options"></div>
    </div>

    <div class="detail-info">
      <h1 id="product-name"></h1>

      <p><strong>Матеріал:</strong> <span id="product-material"></span></p>
      <p id="product-description"></p>

      <label>Оберіть масштаб:</label>
      <select id="detail-scale"></select>

      <label>Варіант:</label>
      <select id="detail-type">
        <option value="assembled">Зібрана модель</option>
        <option value="unassembled">Розібрана модель</option>
      </select>

          <div id="custom-colors-box" class="product-options" style="display:none;"></div>
      <div id="product-options" class="product-options"></div>

      <h2>Ціна: <span id="detail-price">0</span> грн</h2>

      <button class="checkout-btn" onclick="addConfiguredToCart()">Додати в кошик</button>
    </div>
  </div>
</main>

<div id="cart-modal" class="cart-modal">
  <div class="cart-box">
    <button class="cart-close" onclick="closeCart()">×</button>
    <h2>Ваш кошик</h2>
    <div id="cart-items"></div>
    <h3>Разом: <span id="cart-total">0</span> грн</h3>
  </div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let currentProduct = null;

function getProductIdFromUrl() {
  return new URLSearchParams(window.location.search).get("id");
}

function saveCart() {
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCartCount();
}

function updateCartCount() {
  const counter = document.getElementById("cart-count");
  if (!counter) return;
  counter.textContent = cart.reduce((sum, item) => sum + item.quantity, 0);
}

async function loadProductDetails() {
  const productId = getProductIdFromUrl();

  try {
    const response = await fetch("products.json");
    const products = await response.json();

    currentProduct = products.find(item => item.id === productId);

    if (!currentProduct) {
      document.querySelector("main").innerHTML = "<h2 class='not-found'>Товар не знайдено</h2>";
      return;
    }

    const images = currentProduct.images && currentProduct.images.length
      ? currentProduct.images
      : [currentProduct.image];

    document.getElementById("product-image").src = images[0];
    document.getElementById("product-image").alt = currentProduct.name;
    document.getElementById("product-name").textContent = currentProduct.name;
    document.getElementById("product-material").textContent = currentProduct.material;
    document.getElementById("product-description").textContent = currentProduct.description;

    renderThumbs(images);
    renderScales();
    renderColorVariants();
    renderProductOptions();
    updateDetailPrice();

  } catch (error) {
    console.error(error);
    document.querySelector("main").innerHTML = "<h2 class='not-found'>Помилка завантаження товару</h2>";
  }
}

function renderThumbs(images) {
  const thumbs = document.getElementById("product-thumbs");
  thumbs.innerHTML = "";

  images.forEach((src, index) => {
    const img = document.createElement("img");
    img.src = src;
    img.alt = "Фото " + (index + 1);
    img.onclick = () => {
      document.getElementById("product-image").src = src;
    };
    thumbs.appendChild(img);
  });
}

function renderScales() {
  const scaleSelect = document.getElementById("detail-scale");
  scaleSelect.innerHTML = "";

  currentProduct.scales.forEach(item => {
    scaleSelect.innerHTML += `
      <option value="${item.scale}" data-assembled="${item.assembled}" data-unassembled="${item.unassembled}">
        ${item.scale}
      </option>
    `;
  });
}

function renderColorVariants() {
  const box = document.getElementById("color-variants");
  box.innerHTML = "";

  if (!currentProduct.colorVariants || currentProduct.colorVariants.length === 0) return;

  box.innerHTML = "<h3>Оберіть колір моделі</h3>";

  currentProduct.colorVariants.forEach((variant, index) => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "color-variant-btn";
    btn.textContent = variant.name + (variant.price > 0 ? " +" + variant.price + " грн" : "");
    btn.dataset.name = variant.name;
    btn.dataset.image = variant.image;
    btn.dataset.price = variant.price || 0;

    if (index === 0) btn.classList.add("active-color");

    btn.addEventListener("click", () => {
      document.querySelectorAll(".color-variant-btn").forEach(button => {
        button.classList.remove("active-color");
      });

      btn.classList.add("active-color");
      document.getElementById("product-image").src = variant.image;

      if (variant.name === "Індивідуальні кольори") {
        renderCustomColorParts();
        document.getElementById("custom-colors-box").style.display = "block";
      } else {
        document.getElementById("custom-colors-box").style.display = "none";
      }

      updateDetailPrice();
    });

    box.appendChild(btn);
  });
}

function renderCustomColorParts() {
  const box = document.getElementById("custom-colors-box");
  box.innerHTML = "<h3>Індивідуальні кольори деталей</h3>";

  if (!currentProduct.customColorParts) return;

  const colors = [
    "Не обрано",
    "Червоний",
    "Синій",
    "Блакитний",
    "Зелений",
    "Чорний",
    "Білий",
    "Сірий",
    "Жовтий",
    "Помаранчевий",
    "Хакі"
  ];

  currentProduct.customColorParts.forEach(part => {
    const options = colors.map(color => `<option value="${color}">${color}</option>`).join("");

    box.innerHTML += `
      <div class="option-block">
        <label>${part}</label>
        <select class="custom-color-select" data-title="${part}">
          ${options}
        </select>
      </div>
    `;
  });

  document.querySelectorAll(".custom-color-select").forEach(select => {
    select.addEventListener("change", updateDetailPrice);
  });
}

function getSelectedColorVariant() {
  const active = document.querySelector(".color-variant-btn.active-color");

  if (!active) {
    return {
      title: "Колір моделі",
      value: "Не обрано",
      price: 0
    };
  }

  return {
    title: "Колір моделі",
    value: active.dataset.name,
    price: Number(active.dataset.price || 0)
  };
}

function getCustomColors() {
  const selected = [];

  document.querySelectorAll(".custom-color-select").forEach(select => {
    if (select.value !== "Не обрано") {
      selected.push({
        title: select.dataset.title,
        value: select.value,
        price: 0
      });
    }
  });

  return selected;
}

function renderProductOptions() {
  const optionsBox = document.getElementById("product-options");
  optionsBox.innerHTML = "";

  if (!currentProduct.options || currentProduct.options.length === 0) return;

  optionsBox.innerHTML = "<h3>Додаткові опції</h3>";

  currentProduct.options.forEach(option => {
    const wrapper = document.createElement("div");
    wrapper.className = "option-block";

    if (option.type === "select") {
      const choices = option.choices.map(choice => `
        <option value="${choice.name}" data-price="${choice.price || 0}">
          ${choice.name}${choice.price > 0 ? " +" + choice.price + " грн" : ""}
        </option>
      `).join("");

      wrapper.innerHTML = `
        <label>${option.title}</label>
        <select class="product-option" data-title="${option.title}">
          ${choices}
        </select>
      `;
    }

    if (option.type === "checkbox") {
      wrapper.innerHTML = `
        <label class="checkbox-option">
          <input type="checkbox" class="product-option-checkbox" data-title="${option.title}" data-price="${option.price || 0}">
          ${option.title}${option.price > 0 ? " +" + option.price + " грн" : ""}
        </label>
      `;
    }

    if (option.type === "text") {
      wrapper.innerHTML = `
        <label>${option.title}${option.price > 0 ? " +" + option.price + " грн" : ""}</label>
        <input type="text" class="product-option-text" data-title="${option.title}" data-price="${option.price || 0}" placeholder="${option.placeholder || ""}">
      `;
    }

    optionsBox.appendChild(wrapper);
  });

  document.querySelectorAll(".product-option, .product-option-checkbox, .product-option-text").forEach(input => {
    input.addEventListener("change", updateDetailPrice);
    input.addEventListener("input", updateDetailPrice);
  });
}

function getSelectedOptions() {
  const selectedOptions = [];
  let optionsTotal = 0;

  document.querySelectorAll(".product-option").forEach(select => {
    const selected = select.options[select.selectedIndex];
    const price = Number(selected.dataset.price || 0);

    selectedOptions.push({
      title: select.dataset.title,
      value: selected.value,
      price
    });

    optionsTotal += price;
  });

  document.querySelectorAll(".product-option-checkbox").forEach(checkbox => {
    if (checkbox.checked) {
      const price = Number(checkbox.dataset.price || 0);

      selectedOptions.push({
        title: checkbox.dataset.title,
        value: "Так",
        price
      });

      optionsTotal += price;
    }
  });

  document.querySelectorAll(".product-option-text").forEach(input => {
    if (input.value.trim()) {
      const price = Number(input.dataset.price || 0);

      selectedOptions.push({
        title: input.dataset.title,
        value: input.value.trim(),
        price
      });

      optionsTotal += price;
    }
  });

  return { selectedOptions, optionsTotal };
}

function updateDetailPrice() {
  const scaleSelect = document.getElementById("detail-scale");
  const typeSelect = document.getElementById("detail-type");

  if (!scaleSelect.options.length) return;

  const selectedScale = scaleSelect.options[scaleSelect.selectedIndex];

  const basePrice = typeSelect.value === "assembled"
    ? Number(selectedScale.dataset.assembled)
    : Number(selectedScale.dataset.unassembled);

  const { optionsTotal } = getSelectedOptions();
  const colorVariant = getSelectedColorVariant();

  document.getElementById("detail-price").textContent =
    basePrice + optionsTotal + colorVariant.price;
}

function addConfiguredToCart() {
  const scaleSelect = document.getElementById("detail-scale");
  const typeSelect = document.getElementById("detail-type");
  const selectedScale = scaleSelect.options[scaleSelect.selectedIndex];

  const scale = selectedScale.value;
  const type = typeSelect.value === "assembled" ? "Зібрана модель" : "Розібрана модель";

  const basePrice = typeSelect.value === "assembled"
    ? Number(selectedScale.dataset.assembled)
    : Number(selectedScale.dataset.unassembled);

  const { selectedOptions, optionsTotal } = getSelectedOptions();
  const colorVariant = getSelectedColorVariant();
  const customColors = getCustomColors();

  const allOptions = [
    colorVariant,
    ...customColors,
    ...selectedOptions
  ];

  const finalPrice = basePrice + optionsTotal + colorVariant.price;

  const newItem = {
    name: currentProduct.name,
    image: document.getElementById("product-image").src,
    scale,
    type,
    options: allOptions,
    price: finalPrice,
    quantity: 1
  };

  const existing = cart.find(item =>
    item.name === newItem.name &&
    item.scale === newItem.scale &&
    item.type === newItem.type &&
    JSON.stringify(item.options || []) === JSON.stringify(newItem.options || [])
  );

  if (existing) {
    existing.quantity++;
  } else {
    cart.push(newItem);
  }

  saveCart();
  alert("Товар додано в кошик!");
}

function formatOptions(options) {
  if (!options || options.length === 0) return "";
  return options.map(option => {
    return `${option.title}: ${option.value}${option.price ? " (+" + option.price + " грн)" : ""}`;
  }).join("<br>");
}

function openCart() {
  renderCart();
  document.getElementById("cart-modal").style.display = "flex";
}

function closeCart() {
  document.getElementById("cart-modal").style.display = "none";
}

function renderCart() {
  const cartItems = document.getElementById("cart-items");
  const cartTotal = document.getElementById("cart-total");

  cartItems.innerHTML = "";
  let total = 0;

  if (cart.length === 0) {
    cartItems.innerHTML = "<p>Кошик порожній</p>";
    cartTotal.textContent = 0;
    return;
  }

  cart.forEach((item, index) => {
    const itemTotal = item.price * item.quantity;
    total += itemTotal;

    cartItems.innerHTML += `
      <div class="cart-item">
        <img src="${item.image}" alt="${item.name}" class="cart-img">
        <div class="cart-item-info">
          <strong>${item.name}</strong>
          <p>Масштаб: ${item.scale}</p>
          <p>${item.type}</p>
          ${item.options && item.options.length ? `<p class="cart-options">${formatOptions(item.options)}</p>` : ""}
          <p>${item.price} грн × ${item.quantity} = ${itemTotal} грн</p>
          <button onclick="changeQuantity(${index}, -1)">−</button>
          <button onclick="changeQuantity(${index}, 1)">+</button>
          <button onclick="removeFromCart(${index})">Видалити</button>
        </div>
      </div>
    `;
  });

  cartTotal.textContent = total;
}

function changeQuantity(index, amount) {
  cart[index].quantity += amount;

  if (cart[index].quantity <= 0) {
    cart.splice(index, 1);
  }

  saveCart();
  renderCart();
}

function removeFromCart(index) {
  cart.splice(index, 1);
  saveCart();
  renderCart();
}

document.getElementById("detail-scale").addEventListener("change", updateDetailPrice);
document.getElementById("detail-type").addEventListener("change", updateDetailPrice);

document.addEventListener("DOMContentLoaded", () => {
  loadProductDetails();
  updateCartCount();
});
</script>

</body>
</html>
